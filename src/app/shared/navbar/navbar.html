<header>
  <nav>
    <img src="/logo.svg" alt="Apple logo">
    <ul>
      @for (link of navLinks; track $index) {
      <li>
        <a [href]="link.label">{{link.label}}</a>
      </li>
      }
    </ul>
    <div class="flex-center gap-3">
      <button>
        <img src="/search.svg" alt="search">
      </button>
      <button>
        <img src="/cart.svg" alt="cart">
      </button>
    </div>
  </nav>
</header>
